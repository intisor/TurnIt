</div>

</div>

<!-- Form Content Area -->

<section class="max-w-2xl">
<p class="text-on-surface-variant mb-stack-lg font-body-lg text-body-lg">
                    Define the parameters for your new operational resource. Changes take effect immediately across all active rosters.
                </p>
<div class="grid grid-cols-1 gap-stack-lg">
<!-- Resource Name Field -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="res_name">RESOURCE NAME</label>
<input class="w-full bg-surface text-on-surface border border-outline-variant px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-0 rounded-none transition-all" id="res_name" placeholder="e.g. Server Node Alpha" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-lg">
<!-- Current Level Field -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="res_level">CURRENT LEVEL (%)</label>
<div class="relative">
<input class="w-full bg-surface text-on-surface border border-outline-variant px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-0 rounded-none transition-all" id="res_level" max="100" min="0" placeholder="100" type="number"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 font-data-mono text-data-mono text-outline">PCT</span>
</div>
</div>
<!-- Refill Frequency -->
<div class="space-y-base">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="res_freq">REFILL FREQUENCY</label>
<select class="w-full bg-surface text-on-surface border border-outline-variant px-4 py-3 font-body-md text-body-md focus:border-primary focus:ring-0 rounded-none transition-all appearance-none" id="res_freq">
<option value="realtime">Real-time Sync</option>
<option value="hourly">Hourly Batch</option>
<option value="daily">Daily Maintenance</option>
<option value="manual">Manual Trigger</option>
</select>
</div>
</div>

<!-- JavaScript for micro-interactions -->
<script>
        // Real-time Level Preview Update
        const levelInput = document.getElementById('res_level');
        const previewBar = document.getElementById('previewBar');
        
        levelInput.addEventListener('input', (e) => {
            const val = Math.min(Math.max(e.target.value, 0), 100);
            previewBar.style.width = val + '%';
            
            // Color changing logic based on "Pure Flat" requirement
            if (val > 60) {
                previewBar.className = 'h-full transition-all duration-500 bg-state-healthy';
            } else if (val > 25) {
                previewBar.className = 'h-full transition-all duration-500 bg-state-warning';
            } else {
                previewBar.className = 'h-full transition-all duration-500 bg-state-urgent';
            }
        });

        // Simple enter animation on load
        window.addEventListener('load', () => {
            const panel = document.getElementById('slideOver');
            panel.classList.add('slide-over-active');
        });
    </script>
