<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TurnFill - Dashboard</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700&amp;family=Inter:wght@400&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-container": "#00a572",
                        "roster-3": "#06B6D4",
                        "on-error": "#690005",
                        "secondary-fixed": "#6ffbbe",
                        "secondary-fixed-dim": "#4edea3",
                        "roster-4": "#F97316",
                        "tertiary-fixed-dim": "#ffb786",
                        "surface-container": "#1d2027",
                        "secondary": "#4edea3",
                        "on-surface-variant": "#c2c6d6",
                        "on-surface": "#e1e2ec",
                        "on-tertiary-fixed": "#311400",
                        "primary-fixed": "#d8e2ff",
                        "inverse-surface": "#e1e2ec",
                        "inverse-on-surface": "#2e3038",
                        "surface-container-high": "#272a31",
                        "surface-bright": "#363941",
                        "primary": "#adc6ff",
                        "outline": "#8c909f",
                        "roster-1": "#8B5CF6",
                        "primary-fixed-dim": "#adc6ff",
                        "tertiary": "#ffb786",
                        "surface-variant": "#32353c",
                        "on-primary-fixed-variant": "#004395",
                        "on-secondary-fixed": "#002113",
                        "error-container": "#93000a",
                        "error": "#ffb4ab",
                        "roster-2": "#EC4899",
                        "primary-container": "#4d8eff",
                        "inverse-primary": "#005ac2",
                        "surface": "#1E293B",
                        "surface-tint": "#adc6ff",
                        "state-healthy": "#059669",
                        "surface-container-lowest": "#0b0e15",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-primary-fixed": "#001a42",
                        "on-tertiary-container": "#461f00",
                        "on-background": "#e1e2ec",
                        "on-primary-container": "#00285d",
                        "tertiary-fixed": "#ffdcc6",
                        "surface-container-low": "#191b23",
                        "on-secondary-fixed-variant": "#005236",
                        "on-secondary-container": "#00311f",
                        "tertiary-container": "#df7412",
                        "on-tertiary": "#502400",
                        "background": "#0F172A",
                        "on-error-container": "#ffdad6",
                        "outline-variant": "#424754",
                        "surface-container-highest": "#32353c",
                        "state-warning": "#D97706",
                        "on-primary": "#002e6a",
                        "surface-dim": "#10131a",
                        "state-urgent": "#DC2626",
                        "on-secondary": "#003824"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "margin-page": "24px",
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "gutter": "16px",
                        "stack-sm": "8px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Hanken Grotesk"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-md": ["Hanken Grotesk"],
                        "data-mono": ["JetBrains Mono"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "data-mono": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        /* Flat UI active states */
        button:active { transform: scale(0.98); }
        .fill-bar { transition: height 0.5s ease-in-out; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="w-full top-0 sticky border-b border-outline-variant dark:border-outline-variant flex justify-between items-center px-margin-page h-16 bg-background dark:bg-background z-40 transition-colors duration-200">
<button aria-label="Groups" class="flex items-center justify-center p-2 -ml-2 rounded-full hover:bg-surface-variant text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">groups</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary text-center">TurnFill</h1>
<button aria-label="Settings" class="flex items-center justify-center p-2 -mr-2 rounded-full hover:bg-surface-variant text-primary dark:text-primary-fixed">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_circle</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-1 flex flex-col gap-stack-md px-margin-page py-stack-md pb-32 overflow-y-auto">
<!-- Header Text -->
<div class="pb-stack-sm pt-stack-sm flex justify-between items-end border-b border-outline-variant">
<h2 class="font-headline-md text-headline-md text-on-surface">Resource Status</h2>
<span class="font-data-mono text-data-mono text-on-surface-variant">3 Items</span>
</div>
<!-- Resource Card 1: Healthy -->
<article class="relative w-full h-48 bg-surface rounded-xl overflow-hidden border border-outline-variant cursor-pointer group">
<!-- Vertical Fill Indicator -->
<div class="absolute bottom-0 left-0 w-full bg-state-healthy opacity-20 fill-bar" style="height: 80%;"></div>
<div class="relative z-10 w-full h-full flex flex-col justify-between p-stack-md">
<div class="flex justify-between items-start w-full">
<h3 class="font-headline-md text-headline-md text-on-surface">Whole Milk</h3>
<!-- Roster Chip -->
<div class="flex items-center gap-1 bg-roster-1 text-white px-3 py-1 rounded-full border border-surface">
<span class="font-label-caps text-label-caps uppercase">Sarah</span>
</div>
</div>
<div class="flex justify-between items-end w-full">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-state-healthy uppercase tracking-wider mb-1">Healthy</span>
<span class="font-display-lg text-display-lg text-on-surface leading-none">80%</span>
</div>
<button class="bg-surface-variant text-on-surface-variant hover:bg-state-healthy hover:text-white border border-outline-variant hover:border-state-healthy px-4 py-2 rounded-lg font-label-caps text-label-caps uppercase tracking-wider transition-colors">
                        Log Use
                    </button>
</div>
</div>
<!-- Active focus border simulation -->
<div class="absolute inset-0 border-2 border-transparent group-hover:border-state-healthy rounded-xl pointer-events-none transition-colors"></div>
</article>
<!-- Resource Card 2: Warning -->
<article class="relative w-full h-48 bg-surface rounded-xl overflow-hidden border border-outline-variant cursor-pointer group">
<!-- Vertical Fill Indicator -->
<div class="absolute bottom-0 left-0 w-full bg-state-warning opacity-20 fill-bar" style="height: 35%;"></div>
<div class="relative z-10 w-full h-full flex flex-col justify-between p-stack-md">
<div class="flex justify-between items-start w-full">
<h3 class="font-headline-md text-headline-md text-on-surface">Dish Soap</h3>
<!-- Roster Chip -->
<div class="flex items-center gap-1 bg-roster-3 text-white px-3 py-1 rounded-full border border-surface">
<span class="font-label-caps text-label-caps uppercase">Mike</span>
</div>
</div>
<div class="flex justify-between items-end w-full">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-state-warning uppercase tracking-wider mb-1">Depleting</span>
<span class="font-display-lg text-display-lg text-on-surface leading-none">35%</span>
</div>
<button class="bg-surface-variant text-on-surface-variant hover:bg-state-warning hover:text-white border border-outline-variant hover:border-state-warning px-4 py-2 rounded-lg font-label-caps text-label-caps uppercase tracking-wider transition-colors">
                        Log Use
                    </button>
</div>
</div>
<div class="absolute inset-0 border-2 border-transparent group-hover:border-state-warning rounded-xl pointer-events-none transition-colors"></div>
</article>
<!-- Resource Card 3: Urgent -->
<article class="relative w-full h-48 bg-surface rounded-xl overflow-hidden border border-outline-variant cursor-pointer group">
<!-- Vertical Fill Indicator -->
<div class="absolute bottom-0 left-0 w-full bg-state-urgent opacity-20 fill-bar" style="height: 5%;"></div>
<div class="relative z-10 w-full h-full flex flex-col justify-between p-stack-md">
<div class="flex justify-between items-start w-full">
<h3 class="font-headline-md text-headline-md text-on-surface">Coffee Beans</h3>
<!-- Roster Chip -->
<div class="flex items-center gap-1 bg-roster-4 text-white px-3 py-1 rounded-full border border-surface">
<span class="font-label-caps text-label-caps uppercase">You</span>
</div>
</div>
<div class="flex justify-between items-end w-full">
<div class="flex flex-col">
<span class="font-label-caps text-label-caps text-state-urgent uppercase tracking-wider mb-1">Urgent</span>
<span class="font-display-lg text-display-lg text-on-surface leading-none">5%</span>
</div>
<!-- Refill Action for Urgent State -->
<button class="bg-state-urgent text-white border-none px-6 py-2 rounded-lg font-label-caps text-label-caps uppercase tracking-wider transition-colors hover:brightness-110 active:scale-95 shadow-none">
                        Refill
                    </button>
</div>
</div>
<!-- High-priority border -->
<div class="absolute inset-0 border-2 border-state-urgent/50 group-hover:border-state-urgent rounded-xl pointer-events-none transition-colors"></div>
</article>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 border-t border-outline-variant dark:border-outline-variant flex justify-around items-center h-20 pb-safe px-base bg-surface-container-low dark:bg-surface-dim">
<!-- Active Nav Item: Dashboard -->
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-full px-4 py-1 active:scale-95 transition-transform duration-100 w-20">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="font-label-caps text-[10px] uppercase tracking-wide">Dashboard</span>
</button>
<!-- Inactive Nav Item: Roster -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full px-4 py-1 active:scale-95 transition-transform duration-100 w-20">
<span class="material-symbols-outlined mb-1">group</span>
<span class="font-label-caps text-[10px] uppercase tracking-wide">Roster</span>
</button>
<!-- Inactive Nav Item: History -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full px-4 py-1 active:scale-95 transition-transform duration-100 w-20">
<span class="material-symbols-outlined mb-1">history</span>
<span class="font-label-caps text-[10px] uppercase tracking-wide">History</span>
</button>
<!-- Inactive Nav Item: Settings -->
<button class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high rounded-full px-4 py-1 active:scale-95 transition-transform duration-100 w-20">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-label-caps text-[10px] uppercase tracking-wide">Settings</span>
</button>
</nav>
</body></html>
