<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <!-- Mobile-first viewport with safe area support -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0F172A" />

    <!-- PWA / Home screen -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TurnFill" />

    <!-- SEO -->
    <meta name="description" content="TurnFill tracks shared consumable depletion and manages roster turns for refilling them." />
    <title>TurnFill — Depletion & Roster Engine</title>
    <base href="/" />

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <!-- Tailwind Config -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-container": "#00a572",
                        "roster-3":            "#06B6D4",
                        "on-error":            "#690005",
                        "secondary-fixed":     "#6ffbbe",
                        "secondary-fixed-dim": "#4edea3",
                        "roster-4":            "#F97316",
                        "tertiary-fixed-dim":  "#ffb786",
                        "surface-container":   "#1d2027",
                        "secondary":           "#4edea3",
                        "on-surface-variant":  "#c2c6d6",
                        "on-surface":          "#e1e2ec",
                        "on-tertiary-fixed":   "#311400",
                        "primary-fixed":       "#d8e2ff",
                        "inverse-surface":     "#e1e2ec",
                        "inverse-on-surface":  "#2e3038",
                        "surface-container-high":    "#272a31",
                        "surface-bright":      "#363941",
                        "primary":             "#adc6ff",
                        "outline":             "#8c909f",
                        "roster-1":            "#8B5CF6",
                        "primary-fixed-dim":   "#adc6ff",
                        "tertiary":            "#ffb786",
                        "surface-variant":     "#32353c",
                        "on-primary-fixed-variant": "#004395",
                        "on-secondary-fixed":  "#002113",
                        "error-container":     "#93000a",
                        "error":               "#ffb4ab",
                        "roster-2":            "#EC4899",
                        "roster-5":            "#10B981",
                        "primary-container":   "#4d8eff",
                        "inverse-primary":     "#005ac2",
                        "surface":             "#1E293B",
                        "surface-tint":        "#adc6ff",
                        "state-healthy":       "#059669",
                        "surface-container-lowest": "#0b0e15",
                        "on-tertiary-fixed-variant": "#723600",
                        "on-primary-fixed":    "#001a42",
                        "on-tertiary-container": "#461f00",
                        "on-background":       "#e1e2ec",
                        "on-primary-container": "#00285d",
                        "tertiary-fixed":      "#ffdcc6",
                        "surface-container-low": "#191b23",
                        "on-secondary-fixed-variant": "#005236",
                        "on-secondary-container": "#00311f",
                        "tertiary-container":  "#df7412",

                        "surface-container-highest": "#32353c",
                        "state-warning":       "#D97706",
                        "on-primary":          "#002e6a",
                        "surface-dim":         "#10131a",
                        "state-urgent":        "#DC2626",
                        "on-secondary":        "#003824"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg:      "0.5rem",
                        xl:      "0.75rem",
                        "2xl":   "1rem",
                        full:    "9999px"
                    },
                    spacing: {
                        "margin-page": "16px",
                        "stack-lg":   "24px",
                        "stack-md":   "16px",
                        "gutter":     "12px",
                        "stack-sm":   "8px",
                        "base":       "4px"
                    },
                    fontFamily: {
                        "headline-sm":  ["Hanken Grotesk", "sans-serif"],
                        "label-caps":   ["JetBrains Mono", "monospace"],
                        "headline-md":  ["Hanken Grotesk", "sans-serif"],
                        "data-mono":    ["JetBrains Mono", "monospace"],
                        "body-md":      ["Inter", "sans-serif"],
                        "body-sm":      ["Inter", "sans-serif"],
                        "body-lg":      ["Inter", "sans-serif"],
                        "display-lg":   ["Hanken Grotesk", "sans-serif"]
                    },
                    fontSize: {
                        "headline-sm":  ["18px", { lineHeight: "26px", fontWeight: "600" }],
                        "label-caps":   ["11px", { lineHeight: "16px", letterSpacing: "0.06em", fontWeight: "500" }],
                        "headline-md":  ["22px", { lineHeight: "30px", fontWeight: "600" }],
                        "data-mono":    ["13px", { lineHeight: "20px", fontWeight: "400" }],
                        "body-sm":      ["13px", { lineHeight: "20px", fontWeight: "400" }],
                        "body-md":      ["15px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-lg":      ["17px", { lineHeight: "26px", fontWeight: "400" }],
                        "display-lg":   ["44px", { lineHeight: "52px", letterSpacing: "-0.02em", fontWeight: "700" }]

                }
            }
        }
    </script>
    <link href="app.css" rel="stylesheet" />
</head>

<body class="bg-background text-on-background font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
    <div id="app">
        <!-- Loading state -->
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;background:#0F172A;">
            <div style="width:48px;height:48px;border:3px solid #272a31;border-top-color:#adc6ff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:1.5rem;"></div>
            <h2 style="font-family:'Hanken Grotesk',sans-serif;font-size:22px;color:#adc6ff;margin:0 0 4px;">TurnFill</h2>
            <p style="font-family:'Inter',sans-serif;font-size:13px;color:#8c909f;margin:0;">Initializing...</p>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>

</html>
