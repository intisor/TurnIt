<!DOCTYPE html>
<html class="dark" lang="en">

                    "spacing": {
                        "margin-page": "24px",
                        "stack-lg": "32px",
                        "stack-md": "16px",
                        "gutter": "16px",
                        "stack-sm": "8px",

                        "headline-sm": ["Hanken Grotesk"],

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
    <div id="app">
        <!-- Visual premium loading state -->
        <div class="loading-container" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
            <div class="spinner-wrapper" style="margin-bottom:1rem;">
                <div class="loading-ring" style="width:50px; height:50px; border:3px solid #333; border-top-color:#adc6ff; border-radius:50%; animation:spin 1s linear infinite;"></div>
            </div>
            <h2 class="loading-title" style="font-family:'Hanken Grotesk'; font-size:24px; color:#adc6ff;">TurnFill</h2>
            <p class="loading-subtitle" style="font-family:'Inter'; color:#8c909f;">Initializing intelligence engine...</p>
        </div>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
    <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>

</html>
